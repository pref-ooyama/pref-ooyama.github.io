<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大山県公式ホームページ</title>
    <style>
        :root {
            --main-navy: #232337;
            --bg-light: #f4f7f9;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: #333;
        }

        /* 画像を参考にした比率のヘッダー */
        header {
            background: white;
            border-bottom: 1px solid #ddd;
        }
        .header-top {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-box img { height: 50px; }
        .logo-box h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }

        nav { background: var(--main-navy); color: white; }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            list-style: none;
            padding: 0;
        }
        .nav-inner li a {
            display: block;
            padding: 15px 25px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        .nav-inner li a:hover { background: rgba(255,255,255,0.1); }

        /* コンテンツ比率の調整 */
        .main-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* スプレッドシートから読み込むお知らせエリア */
        .news-section {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 4px;
        }
        .news-title { 
            border-left: 5px solid var(--main-navy); 
            padding-left: 15px; 
            margin-bottom: 20px;
            font-size: 18px;
        }
        .news-list { list-style: none; padding: 0; }
        .news-item { 
            padding: 12px 0; 
            border-bottom: 1px dashed #eee; 
            display: flex; 
            flex-direction: column;
            gap: 5px;
        }
        .news-meta { display: flex; gap: 15px; font-size: 13px; color: #666; }
        .news-tag { background: #e74c3c; color: white; padding: 1px 5px; border-radius: 3px; font-size: 10px; }

        /* タイルメニューの比率 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .menu-card {
            background: white;
            border: 1px solid #e0e6ed;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--main-navy);
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .menu-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: var(--main-navy);
        }

        footer { text-align: center; padding: 50px 0; color: #999; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo-box">
            <img src="oyama.webp" alt="Logo">
            <h1>大山県</h1>
        </div>
    </div>
    <nav>
        <ul class="nav-inner">
            <li><a href="police.html">大山県警</a></li>
            <li><a href="fire.html">消防・防災</a></li>
            <li><a href="life.html">くらし・手続き</a></li>
            <li><a href="recruit.html">採用案内</a></li>
        </ul>
    </nav>
</header>

<div class="main-container">
    <section class="news-section">
        <div class="news-title">重要なお知らせ</div>
        <div id="news-loading" style="text-align: center; color: #999;">データを読み込み中...</div>
        <ul class="news-list" id="news-list"></ul>
    </section>

    <div class="menu-grid">
        <a href="rules.html" class="menu-card">条例・規則</a>
        <a href="safety.html" class="menu-card">安全・安心な暮らし</a>
        <a href="traffic.html" class="menu-card">交通安全</a>
        <a href="medical.html" class="menu-card">医療・病院</a>
    </div>
</div>

<footer>
    &copy; 大山県 Oyama Prefecture (RP)
</footer>

<script>
    // ★ここにデプロイしたGASのURLを貼り付けてください
    const GAS_URL = "あなたのGASウェブアプリURL";

    async function loadNews() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            const list = document.getElementById('news-list');
            document.getElementById('news-loading').style.display = 'none';

            data.slice(0, 5).forEach(item => { // 最新5件を表示
                const li = document.createElement('li');
                li.className = 'news-item';
                li.innerHTML = `
                    <div class="news-meta">
                        <span class="date">${item.日付}</span>
                        <span class="news-tag">NEW</span>
                        <span class="author">配信：${item.配信元}</span>
                    </div>
                    <div class="news-text">${item.内容}</div>
                `;
                list.appendChild(li);
            });
        } catch (e) {
            document.getElementById('news-loading').innerText = "お知らせの読み込みに失敗しました。";
        }
    }

    loadNews();
</script>
</body>
</html>
