<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大山県公式ホームページ</title>
    <link rel="icon" href="oyama.webp" type="image/webp">
    <style>
        :root {
            --main-navy: #232337;
            --police-navy: #182b4b;
            --accent-red: #d93333;
            --bg-light: #f4f7f9;
            --header-height: 100px;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: #333;
            line-height: 1.6;
        }

        /* ヘッダー・ナビゲーション */
        header {
            background: #ffffff;
            border-bottom: 3px solid var(--main-navy);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-top {
            background: var(--main-navy);
            color: white;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-area { display: flex; align-items: center; gap: 15px; }
        .brand-area img { height: 45px; width: auto; }
        .brand-area h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }

        /* トップバーメニュー */
        .top-menu {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px;
        }
        .top-menu a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .top-menu a:hover { text-decoration: underline; }

        /* 防災情報（最上部固定） */
        .disaster-bar {
            background: var(--accent-red);
            color: white;
            padding: 12px 40px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .disaster-link {
            color: white;
            border: 1px solid white;
            padding: 2px 12px;
            text-decoration: none;
            font-size: 13px;
        }

        /* 画像に基づいたメインカテゴリー */
        .category-nav {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            max-width: 1400px;
            margin: 0 auto;
            border-bottom: 1px solid #ddd;
        }
        .category-item {
            text-align: center;
            padding: 20px 10px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            font-weight: bold;
            border-right: 1px solid #eee;
            transition: background 0.2s;
        }
        .category-item:last-child { border-right: none; }
        .category-item:hover { background: #f0f0f0; }
        .category-item span { display: block; margin-top: 5px; }

        /* コンテンツエリア */
        .main-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* お知らせ2カラム */
        .news-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        @media (max-width: 800px) { .news-grid { grid-template-columns: 1fr; } }

        .news-section { background: white; border: 1px solid #ddd; padding: 25px; border-radius: 4px; }
        .news-title { 
            border-left: 6px solid var(--main-navy); 
            padding-left: 15px; 
            margin-bottom: 20px; 
            font-size: 18px; 
            font-weight: bold; 
        }
        .title-police { border-left-color: var(--police-navy); }

        .news-list { list-style: none; padding: 0; margin: 0; }
        .news-item { padding: 12px 0; border-bottom: 1px dashed #eee; }
        .news-meta { font-size: 12px; color: #666; margin-bottom: 5px; }
        .tag { background: #eee; color: #333; padding: 2px 6px; font-size: 10px; font-weight: bold; margin-right: 8px; }

        /* 職員投稿エリア */
        .staff-area {
            border: 1px dashed #bbb;
            padding: 15px;
            background: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        .staff-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 13px; font-weight: bold; }
        #postForm { display: none; text-align: left; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .form-group { margin-bottom: 10px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .submit-btn { background: var(--main-navy); color: white; border: none; padding: 10px 20px; cursor: pointer; }

        footer { text-align: center; padding: 50px 0; color: #888; font-size: 12px; border-top: 1px solid #ddd; background: white; }
    </style>
</head>
<body>

<!-- 防災情報（最上部） -->
<div class="disaster-bar">
    <span>【防災・緊急情報】現在、重大な災害情報は発表されていません。</span>
    <a href="fire.html" class="disaster-link">詳細確認</a>
</div>

<header>
    <div class="header-top">
        <div class="brand-area">
            <img src="oyama.webp" alt="大山県章">
            <h1>大山県</h1>
        </div>
        <ul class="top-menu">
            <li><a href="police.html">大山県警本部</a></li>
            <li><a href="fire.html">消防局</a></li>
            <li><a href="contact.html">お問い合わせ</a></li>
            <li><a href="sitemap.html">サイトマップ</a></li>
        </ul>
    </div>

    <!-- 画像内容に基づくナビゲーション -->
    <nav class="category-nav">
        <a href="life.html" class="category-item">くらし・子育て</a>
        <a href="medical.html" class="category-item">健康・福祉</a>
        <a href="work.html" class="category-item">しごと・産業</a>
        <a href="tourism.html" class="category-item">観光・文化・スポーツ</a>
        <a href="land.html" class="category-item">県土・まちづくり</a>
        <a href="admin.html" class="category-item">県政情報</a>
        <a href="recruit.html" class="category-item" style="background: #fff9e6;">採用案内</a>
    </nav>
</header>

<div class="main-container">

    <!-- 職員用投稿フォーム -->
    <section class="staff-area">
        <button class="staff-btn" onclick="toggleForm()">+ 職員専用：お知らせ投稿管理</button>
        <div id="postForm">
            <div class="form-group"><input type="password" id="authPass" placeholder="パスワード"></div>
            <div class="form-group"><input type="text" id="postAuthor" placeholder="部署名"></div>
            <div class="form-group"><textarea id="postContent" placeholder="お知らせ内容"></textarea></div>
            <button class="submit-btn" onclick="submitPost()">投稿を実行</button>
        </div>
    </section>

    <!-- お知らせセクション -->
    <div class="news-grid">
        <!-- 県庁お知らせ -->
        <section class="news-section">
            <div class="news-title">県政からのお知らせ</div>
            <ul class="news-list" id="pref-news-list">
                <li style="text-align:center; color:#999; padding:20px;">読み込み中...</li>
            </ul>
        </section>

        <!-- 県警お知らせ -->
        <section class="news-section">
            <div class="news-title title-police">大山県警からのお知らせ</div>
            <ul class="news-list" id="police-news-list">
                <li style="text-align:center; color:#999; padding:20px;">読み込み中...</li>
            </ul>
        </section>
    </div>

</div>

<footer>
    &copy; 大山県 Oyama Prefecture (Roleplay Only)
</footer>

<script>
    // GAS設定
    const PREF_GAS_URL = "https://script.google.com/macros/s/AKfycbzQ6Z5X2K49-e51N4h0i0ObfYr5Zx40ZSKT-UrJmwsx6Ok6RsRfrVFQPtwQnT3GH9c8/exec";
    const POLICE_GAS_URL = "https://script.google.com/macros/s/AKfycbzNPG3HTc8qmTp8M4xDRuqNZUu_H5FVpheKjj9JkQE8-O2VYXDcDYHrGCpSCyUHs2Q/exec";

    // お知らせ読み込み
    async function loadNews() {
        try {
            // 県庁
            const pRes = await fetch(PREF_GAS_URL);
            const pData = await pRes.json();
            const pList = document.getElementById('pref-news-list');
            pList.innerHTML = '';
            pData.slice(-5).reverse().forEach(item => {
                const li = document.createElement('li');
                li.className = 'news-item';
                li.innerHTML = `<div class="news-meta"><span class="tag">県政</span>${item.日付 || ''} - ${item.配信元 || ''}</div><div>${item.内容 || ''}</div>`;
                pList.appendChild(li);
            });

            // 県警
            const polRes = await fetch(POLICE_GAS_URL);
            const polData = await polRes.json();
            const polList = document.getElementById('police-news-list');
            polList.innerHTML = '';
            polData.slice(-5).reverse().forEach(item => {
                const li = document.createElement('li');
                li.className = 'news-item';
                li.innerHTML = `<div class="news-meta"><span class="tag" style="background:#182b4b;color:white;">警察</span>${item.date || ''} - ${item.author || ''}</div><div>${item.content || ''}</div>`;
                polList.appendChild(li);
            });
        } catch (e) { console.error("データ取得エラー"); }
    }

    function toggleForm() {
        const f = document.getElementById('postForm');
        f.style.display = (f.style.display === 'block') ? 'none' : 'block';
    }

    async function submitPost() {
        const pass = document.getElementById('authPass').value;
        if (pass !== "oyama123") { alert("パスワードが違います"); return; }
        // 実際のPOST処理をここに記述
        alert("投稿機能はGAS側と連携して動作します。");
    }

    window.onload = loadNews;
</script>
</body>
</html>
