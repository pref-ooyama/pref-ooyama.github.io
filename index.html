<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大山県公式ホームページ</title>
    <link rel="icon" href="oyama.webp" type="image/webp">
    <style>
        :root {
            --main-navy: #232337;
            --police-navy: #182b4b;
            --accent-red: #d93333;
            --bg-light: #f4f7f9;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: #333;
            line-height: 1.6;
        }

        /* 1. 防災情報（最上部） */
        .disaster-bar {
            background: var(--accent-red);
            color: white;
            padding: 10px 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .disaster-link {
            color: white;
            border: 1px solid white;
            padding: 2px 10px;
            text-decoration: none;
            font-size: 12px;
            white-space: nowrap;
        }

        /* 2. メインヘッダー（紺色ゾーン） */
        header {
            background: var(--main-navy);
            color: white;
            padding: 15px 0;
            position: relative;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ロゴと上部サブメニュー */
        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand-area { display: flex; align-items: center; gap: 15px; }
        .brand-area img { height: 40px; width: auto; filter: brightness(0) invert(1); }
        .brand-area h1 { margin: 0; font-size: 22px; letter-spacing: 2px; }

        .sub-menu {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 15px;
        }
        .sub-menu a { color: #ccc; text-decoration: none; font-size: 13px; }
        .sub-menu a:hover { color: white; }

        /* メインナビゲーション（デスクトップ） */
        .main-nav {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }
        .nav-list {
            display: flex;
            justify-content: space-between;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-list a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 5px 10px;
        }
        .nav-list a:hover { color: #f9d58e; }

        /* ハンバーガーメニュー（スマホ） */
        .menu-toggle {
            display: none;
            background: none;
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 3. コンテンツエリア */
        .main-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .news-section { background: white; border: 1px solid #ddd; padding: 20px; }
        .news-title { border-left: 5px solid var(--main-navy); padding-left: 12px; margin-bottom: 15px; font-weight: bold; }
        .title-police { border-left-color: var(--police-navy); }
        .news-list { list-style: none; padding: 0; font-size: 14px; }
        .news-item { padding: 10px 0; border-bottom: 1px dashed #eee; }
        .tag { font-size: 10px; padding: 2px 4px; background: #eee; margin-right: 5px; }

        /* 4. レスポンシブ対応 */
        @media (max-width: 850px) {
            .sub-menu, .main-nav { display: none; } /* デフォルトで隠す */
            .menu-toggle { display: block; } /* ボタン表示 */
            
            .header-top-row { margin-bottom: 0; }
            .news-grid { grid-template-columns: 1fr; }

            /* モバイルメニュー展開時 */
            .mobile-open .sub-menu, 
            .mobile-open .main-nav {
                display: block;
                width: 100%;
                background: var(--main-navy);
                position: absolute;
                left: 0;
                top: 100%;
                z-index: 999;
                padding: 20px;
                border-top: 1px solid rgba(255,255,255,0.2);
            }
            .mobile-open .nav-list { flex-direction: column; gap: 15px; }
            .mobile-open .sub-menu { display: flex; flex-wrap: wrap; margin-bottom: 20px; }
        }

        footer { text-align: center; padding: 40px 0; color: #888; font-size: 11px; }
    </style>
</head>
<body id="bodyTag">

<div class="disaster-bar">
    <span>【防災】重大な災害情報は発表されていません</span>
    <a href="fire.html" class="disaster-link">詳細確認</a>
</div>

<header>
    <div class="header-inner">
        <div class="header-top-row">
            <div class="brand-area">
                <img src="oyama.webp" alt="県章">
                <h1>大山県</h1>
            </div>
            
            <!-- スマホ用ボタン -->
            <button class="menu-toggle" onclick="toggleMenu()">MENU</button>

            <!-- サブメニュー -->
            <ul class="sub-menu">
                <li><a href="police.html">大山県警本部</a></li>
                <li><a href="fire.html">消防局</a></li>
                <li><a href="contact.html">お問い合わせ</a></li>
                <li><a href="sitemap.html">サイトマップ</a></li>
            </ul>
        </div>

        <!-- メインナビ -->
        <nav class="main-nav" id="mainNav">
            <ul class="nav-list">
                <li><a href="life.html">くらし・子育て</a></li>
                <li><a href="medical.html">健康・福祉</a></li>
                <li><a href="work.html">しごと・産業</a></li>
                <li><a href="tourism.html">観光・文化</a></li>
                <li><a href="land.html">県土・まちづくり</a></li>
                <li><a href="admin.html">県政情報</a></li>
                <li><a href="recruit.html" style="color:#f9d58e;">採用案内</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="main-container">
    <div class="news-grid">
        <section class="news-section">
            <div class="news-title">県政からのお知らせ</div>
            <ul class="news-list" id="pref-list"><li>読み込み中...</li></ul>
        </section>

        <section class="news-section">
            <div class="news-title title-police">大山県警からのお知らせ</div>
            <ul class="news-list" id="police-list"><li>読み込み中...</li></ul>
        </section>
    </div>
</div>

<footer>
    &copy; 大山県 Oyama Prefecture
</footer>

<script>
    // ハンバーガーメニュー制御
    function toggleMenu() {
        document.getElementById('bodyTag').classList.toggle('mobile-open');
    }

    // GAS読み込み処理（URLは適宜最新に書き換えてください）
    const PREF_URL = "https://script.google.com/macros/s/AKfycbzQ6Z5X2K49-e51N4h0i0ObfYr5Zx40ZSKT-UrJmwsx6Ok6RsRfrVFQPtwQnT3GH9c8/exec";
    const POLICE_URL = "https://script.google.com/macros/s/AKfycbNPG3HTc8qmTp8M4xDRuqNZUu_H5FVpheKjj9JkQE8-O2VYXDcDYHrGCpSCyUHs2Q/exec";

    async function fetchNews() {
        try {
            const [pRes, polRes] = await Promise.all([fetch(PREF_URL), fetch(POLICE_URL)]);
            const pData = await pRes.json();
            const polData = await polRes.json();

            const render = (id, data, label) => {
                const el = document.getElementById(id);
                el.innerHTML = data.slice(-5).reverse().map(item => `
                    <li class="news-item">
                        <div class="news-meta"><span class="tag">${label}</span>${item.日付 || item.date || ''}</div>
                        <div>${item.内容 || item.content || ''}</div>
                    </li>
                `).join('');
            };

            render('pref-list', pData, '県政');
            render('police-list', polData, '警察');
        } catch (e) { console.error("Load failed"); }
    }

    window.onload = fetchNews;
</script>
</body>
</html>
