<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大山県公式ホームページ</title>
    <link rel="icon" href="oyama.webp" type="image/webp">
    <style>
        :root {
            --main-navy: #182b4b; /* 画像に合わせた濃紺 */
            --bg-light: #f4f7f9;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: #333;
        }

        /* ヘッダー：紺色ゾーン */
        header {
            background: var(--main-navy);
            color: white;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            padding: 0 20px;
        }

        /* 左側：ロゴエリア */
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }
        .logo-area img {
            height: 50px;
            width: auto;
            filter: brightness(0) invert(1);
        }
        .logo-area h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }

        /* 右側：ナビゲーション（画像準拠） */
        .nav-wrapper {
            display: flex;
            height: 100%;
            align-items: center;
        }

        .main-nav {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border-left: 1px solid rgba(255,255,255,0.2);
            height: 100%;
            transition: background 0.2s;
        }
        .nav-item:last-child {
            border-right: 1px solid rgba(255,255,255,0.2);
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
        }

        /* ハンバーガーメニュー（スマホ用） */
        .menu-btn {
            display: none;
            background: none;
            border: 1px solid white;
            color: white;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        /* カテゴリナビ（白背景ゾーン） */
        .cat-nav {
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: center;
        }
        .cat-nav a {
            padding: 15px 20px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            font-weight: bold;
            border-right: 1px solid #eee;
        }
        .cat-nav a:hover { background: #f9f9f9; }

        /* コンテンツ */
        .content {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .news-box {
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
        }
        .news-box h2 {
            font-size: 18px;
            margin-top: 0;
            border-left: 4px solid var(--main-navy);
            padding-left: 10px;
        }
        .news-list { list-style: none; padding: 0; font-size: 14px; }
        .news-list li { padding: 10px 0; border-bottom: 1px dashed #eee; }

        /* レスポンシブ */
        @media (max-width: 1000px) {
            .main-nav, .cat-nav { display: none; }
            .menu-btn { display: block; }
            .content { grid-template-columns: 1fr; }
            
            .mobile-menu-open .main-nav {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 80px;
                left: 0;
                width: 100%;
                background: var(--main-navy);
                height: auto;
            }
            .mobile-menu-open .nav-item {
                border: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding: 20px;
            }
        }

        footer { text-align: center; padding: 40px; color: #999; font-size: 12px; }
    </style>
</head>
<body id="pageBody">

<header>
    <div class="header-container">
        <a href="#" class="logo-area">
            <img src="oyama.webp" alt="大山県章">
            <h1>大山県</h1>
        </a>

        <button class="menu-btn" onclick="toggleMenu()">メニュー</button>

        <nav class="nav-wrapper" id="navWrapper">
            <div class="main-nav">
                <a href="disaster.html" class="nav-item">防災情報</a>
                <a href="intro.html" class="nav-item">大山県のご紹介</a>
                <a href="safety.html" class="nav-item">安全・安心な暮らし</a>
                <a href="traffic.html" class="nav-item">交通安全</a>
                <a href="apply.html" class="nav-item">各種申請・手続き</a>
                <a href="contact.html" class="nav-item">ご相談窓口</a>
                <a href="recruit.html" class="nav-item">採用案内</a>
            </div>
        </nav>
    </div>
</header>

<nav class="cat-nav">
    <a href="#">くらし・子育て</a>
    <a href="#">健康・福祉</a>
    <a href="#">しごと・産業</a>
    <a href="#">観光・文化・スポーツ</a>
    <a href="#">県土・まちづくり</a>
    <a href="#">県政情報</a>
</nav>

<main class="content">
    <section class="news-box">
        <h2>県政からのお知らせ</h2>
        <ul class="news-list" id="pref-news"><li>読み込み中...</li></ul>
    </section>

    <section class="news-box">
        <h2>大山県警からのお知らせ</h2>
        <ul class="news-list" id="police-news"><li>読み込み中...</li></ul>
    </section>
</main>

<footer>
    &copy; 大山県 Oyama Prefecture
</footer>

<script>
    function toggleMenu() {
        document.getElementById('pageBody').classList.toggle('mobile-menu-open');
    }

    const PREF_URL = "https://script.google.com/macros/s/AKfycbzQ6Z5X2K49-e51N4h0i0ObfYr5Zx40ZSKT-UrJmwsx6Ok6RsRfrVFQPtwQnT3GH9c8/exec";
    const POLICE_URL = "https://script.google.com/macros/s/AKfycbNPG3HTc8qmTp8M4xDRuqNZUu_H5FVpheKjj9JkQE8-O2VYXDcDYHrGCpSCyUHs2Q/exec";

    async function loadData() {
        try {
            const [r1, r2] = await Promise.all([fetch(PREF_URL), fetch(POLICE_URL)]);
            const d1 = await r1.json();
            const d2 = await r2.json();

            document.getElementById('pref-news').innerHTML = d1.slice(-5).reverse().map(i => 
                `<li><strong>${i.日付 || ''}</strong><br>${i.内容 || ''}</li>`).join('');
            
            document.getElementById('police-news').innerHTML = d2.slice(-5).reverse().map(i => 
                `<li><strong>${i.date || ''}</strong><br>${i.content || ''}</li>`).join('');
        } catch (e) { console.error("error"); }
    }
    window.onload = loadData;
</script>
</body>
</html>
